<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Clubs — Club Finder</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="layout">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar-left">
            <nav>
                <h2>Club Finder</h2>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="settings.html">Settings</a></li>
                    <li><a href="club-viewer.html">Club Viewer</a></li>
                    <li><a href="manage-clubs.html">Manage Clubs</a></li>
                    <li><a href="support.html">Support</a></li>
                </ul>
                <a href="#" class="sign-out-link" data-action="sign-out">Sign Out</a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main>
            <h1>My Clubs</h1>
            <p class="page-subtitle">Clubs you've joined as a member</p>
            <div id="my-clubs-grid" class="club-grid">
                <!-- Populated by JS -->
            </div>
            <div id="empty-state" class="empty-state" style="display:none;">
                <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clipboard-list"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></div>
                <h3>You haven't joined any clubs yet</h3>
                <p>Browse clubs on the <a href="index.html">Home</a> page to get started!</p>
            </div>
        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="sidebar-right">
            <h3>Search My Clubs</h3>
            <input type="text" id="searchMyClubs" placeholder="Search your clubs..." />
        </aside>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="club-viewer.js"></script>
</body>

</html>
