<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Club Detail — Club Finder</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>

<body>
    <div class="club-layout">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar-left">
            <nav>
                <h2>Club Finder</h2>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="settings.html">Settings</a></li>
                    <li><a href="club-viewer.html">Club Viewer</a></li>
                    <li><a href="manage-clubs.html">Manage Clubs</a></li>
                    <li><a href="support.html">Support</a></li>
                </ul>
                <a href="#" class="sign-out-link" data-action="sign-out">Sign Out</a>
            </nav>
        </aside>

        <!-- RIGHT/MAIN SECTION -->
        <main class="club-main">
            <!-- TOP NAVIGATION -->
            <div class="club-top-nav">
                <button class="active">Main</button>
                <button>Calendar</button>
                <button>Members</button>
                <button>Contact Info</button>
                <button>Socials</button>
                <button id="manageTabBtn" style="display:none;">Manage</button>
            </div>

            <!-- BANNER -->
            <div class="club-banner">
                <img src="https://picsum.photos/1200/400?random=10" alt="Club Banner">
                <h1 class="club-banner-title" id="clubTitle">The Awesome Club</h1>
            </div>

            <!-- CONTENT AREA -->
            <div class="club-content-area" id="clubContent">
                <h3>Welcome to the club!</h3>
                <p>This is the main view area where content for each tab will live.</p>
            </div>
        </main>

    </div>

    <!-- Cropper Modal -->
    <div id="cropperModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
        <div class="cropper-container-inner" style="background:white; padding:20px; border-radius:8px; width:90%; max-width:800px; max-height:90vh; display:flex; flex-direction:column;">
            <h3 style="margin-top:0; color:black;">Crop Banner Image</h3>
            <div style="flex:1; min-height:400px; max-height:60vh; overflow:hidden; background:#eee; margin-bottom:15px;">
                <img id="cropperImage" style="max-width:100%; display:block;">
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button class="btn-secondary" id="cancelCropBtn">Cancel</button>
                <button class="btn-primary" id="applyCropBtn">Apply & Upload</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="club.js"></script>
</body>

</html>
